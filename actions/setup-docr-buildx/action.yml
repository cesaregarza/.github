name: Set Up DOCR Buildx
description: Configure Docker Buildx and log in to DigitalOcean Container Registry.

inputs:
  registry:
    required: false
    default: registry.digitalocean.com
  digitalocean-access-token:
    required: true

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to DigitalOcean Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.digitalocean-access-token }}
        password: ${{ inputs.digitalocean-access-token }}

