name: Python uv CI

on:
  workflow_call:
    inputs:
      python_version:
        required: false
        type: string
        default: "3.12"
      working_directory:
        required: false
        type: string
        default: "."
      install_command:
        required: false
        type: string
        default: "uv sync --extra dev"
      test_command:
        required: false
        type: string
        default: "uv run pytest -q"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        working-directory: ${{ inputs.working_directory }}
        run: ${{ inputs.install_command }}

      - name: Run tests
        working-directory: ${{ inputs.working_directory }}
        run: ${{ inputs.test_command }}

