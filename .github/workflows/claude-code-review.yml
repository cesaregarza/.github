name: Claude Code Review

on:
  workflow_call:
    inputs:
      fetch_depth:
        description: Checkout fetch depth.
        required: false
        type: number
        default: 1
      prompt:
        description: Review prompt.
        required: false
        type: string
        default: |
          Please review this pull request and provide feedback on:
          - Code quality and best practices
          - Potential bugs or issues
          - Performance considerations
          - Security concerns
          - Test coverage

          Use the repository's CLAUDE.md for guidance on style and conventions. Be constructive and helpful in your feedback.

          Use `gh pr comment` with your Bash tool to leave your review as a comment on the PR.
      claude_args:
        description: Arguments passed to Claude Code.
        required: false
        type: string
        default: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

permissions:
  contents: read
  pull-requests: read
  issues: read
  id-token: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: ${{ inputs.fetch_depth }}

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ inputs.prompt }}
          claude_args: ${{ inputs.claude_args }}

